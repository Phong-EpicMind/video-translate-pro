name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,cloud]"

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke-test the CLI
        run: |
          translatedub --version
          translatedub config path

  hygiene:
    name: Validate source and release hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Reject tracked build artifacts, binaries, and secret-like files
        run: |
          set -euo pipefail
          forbidden='(^|/)(bin|dist|build|temp|venv|\.venv|__pycache__)/|\.app/|\.dmg$|config\.json$|\.service-account\.json$|credentials.*\.json$|secret.*\.json$'
          if git ls-files | grep -E "$forbidden"; then
            echo "Tracked generated, binary, or secret-like files found." >&2
            exit 1
          fi
          test -f LICENSE
          test -f THIRD_PARTY_NOTICES.md

      - name: Scan tracked files for secret patterns
        run: |
          set -euo pipefail
          if git grep -nE 'AIza[0-9A-Za-z_-]{35}|-----BEGIN (RSA|OPENSSH|PRIVATE) KEY-----|private_key_id|client_secret|ghp_[0-9A-Za-z]{36,}|github_pat_[0-9A-Za-z_]{20,}|sk-[A-Za-z0-9]{20,}' -- . ':(exclude).github/workflows/*'; then
            echo "Secret-like value found in tracked files." >&2
            exit 1
          fi
