name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "24 3 * * 1"

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit Python security scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          python -m pip install "bandit[toml]"

      - name: Run Bandit
        run: bandit -r translatedub -ll
