name: Bug report
description: Report a reproducible problem in TranslateDub AI.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not paste API keys, service account JSON, private videos, or generated media containing private content.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Open the app
        2. Select ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 15.5
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: Python 3.11.x
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove secrets before posting logs.
      render: text
